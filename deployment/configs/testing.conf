# Testing Configuration for Odoo 18
[options]
# Addon paths
addons_path = addons,custom_addons

# Data directory for sessions and attachments
data_dir = ./test_data

# Logging
logfile = ./logs/odoo_test.log
log_level = debug
log_handler = :DEBUG

# Database settings
db_host = localhost
db_port = 5432
db_user = odoo
db_password = odoo

# Server settings
http_port = 8069
workers = 0
max_cron_threads = 1

# Testing options
test_enable = True
test_file = 
stop_after_init = False

# Security (testing only)
admin_passwd = admin
list_db = True

# Performance (testing)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

# Testing specific
without_demo = False
demo = {}

# Internationalization
translate_modules = ['all']
language = en_US