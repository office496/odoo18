# Docker Configuration for Odoo 18
[options]
# Addon paths
addons_path = addons,/mnt/extra-addons,/mnt/custom-addons

# Data directory for sessions and attachments
data_dir = /var/lib/odoo

# Logging
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = :INFO

# Database settings (will be overridden by environment variables)
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

# Server settings
http_port = 8069
workers = 4
max_cron_threads = 2

# Security
admin_passwd = admin
list_db = False

# Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

# Internationalization
without_demo = all